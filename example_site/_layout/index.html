<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{meta_title}} - pmms example</title>
    <style>
        body {
            font-family: monospace;
            background: #f0f0f0;
            color: #333;
            margin: 20px;
            line-height: 1.6;
        }

        body.dark {
            background: #1a1a1a;
            color: #f0f0f0;
        }

        .box {
            border: 3px solid #333;
            background: #fff;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 10px 10px 0 #333;
        }

        body.dark .box {
            border-color: #f0f0f0;
            background: #000;
            box-shadow: 10px 10px 0 #f0f0f0;
        }

        nav {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        nav a {
            margin-right: 15px;
            text-decoration: none;
            border: 1px solid #333;
            padding: 5px 10px;
            background: #eee;
            color: #333;
        }

        body.dark nav a {
            border-color: #f0f0f0;
            background: #333;
            color: #f0f0f0;
        }

        nav a:hover {
            background: #333;
            color: #fff;
        }

        body.dark nav a:hover {
            background: #f0f0f0;
            color: #333;
        }

        #dark-mode-toggle {
            border: 3px solid #333;
            background: #fff;
            cursor: pointer;
            padding: 5px 10px;
            font-family: monospace;
            font-weight: bold;
        }

        body.dark #dark-mode-toggle {
            border-color: #f0f0f0;
            background: #000;
            color: #f0f0f0;
        }

        footer {
            margin-top: 40px;
            font-size: 0.8em;
            border-top: 1px solid #ccc;
            padding-top: 10px;
        }

        h1,
        h2 {
            border-bottom: 2px solid #333;
            padding-bottom: 5px;
        }

        body.dark h1,
        body.dark h2 {
            border-bottom-color: #f0f0f0;
        }

        .blog-list {
            list-style: none;
            padding: 0;
        }

        .blog-list li {
            border: 2px solid #333;
            margin-bottom: 10px;
            padding: 10px;
            background: #fafafa;
        }

        body.dark .blog-list li {
            border-color: #f0f0f0;
            background: #222;
        }

        .post-date {
            font-weight: bold;
            color: #666;
        }
    </style>
</head>

<body>
    <nav>
        <div>
            <a href="/">home</a>
            <a href="/about.html">about</a>
            <a href="/blog/">blog</a>
            <a href="/custom.html">custom</a>
        </div>
        <button id="dark-mode-toggle">dark mode</button>
    </nav>
    <div class="box">
        {{content}}
    </div>
    <script>
        const btn = document.getElementById('dark-mode-toggle');
        const currentTheme = localStorage.getItem('theme');
        if (currentTheme === 'dark') { document.body.classList.add('dark'); }
        btn.addEventListener('click', () => {
            document.body.classList.toggle('dark');
            let theme = 'light';
            if (document.body.classList.contains('dark')) { theme = 'dark'; }
            localStorage.setItem('theme', theme);
        });
    </script>
    <footer>
        generated by pmms (_PMMSVER_) on _PMMSGENDATE_
    </footer>
</body>

</html>
